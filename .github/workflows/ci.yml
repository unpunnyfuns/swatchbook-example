name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      # storybook build writes .swatchbook/tokens.d.ts (the addon codegen);
      # it must run before typecheck so tsc sees the generated declaration.
      - run: pnpm build-storybook
      - run: pnpm typecheck
      - run: pnpm test
